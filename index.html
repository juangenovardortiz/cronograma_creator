<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma Interactivo</title>
    <meta name="ai-instructions" content="llms.txt">
    <meta name="description" content="Interactive Gantt chart builder. AI agents: see /llms.txt for full API documentation.">
    <meta name="ai:docs" content="/cronograma_creator/llms.txt">
    <meta name="ai:capabilities" content="timeline-generation, export-image, share-url, export-json, agent-mode">
    <link rel="alternate" type="text/plain" href="llms.txt" title="AI Instructions">
    <link rel="stylesheet" href="style.css" id="main-stylesheet">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebAPI",
      "name": "Cronograma Creator API",
      "description": "Generate, visualize and export project timelines as Gantt charts. Fully operable by AI agents.",
      "url": "https://juangenovardortiz.github.io/cronograma_creator/",
      "documentation": "https://juangenovardortiz.github.io/cronograma_creator/llms.txt",
      "termsOfService": "https://juangenovardortiz.github.io/cronograma_creator/.well-known/cronograma-ai.json"
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CQLM5S0TNV"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-CQLM5S0TNV');
    </script>
</head>

<body>
    <div class="main-container">
        <div class="top-bar">
            <div class="title-container">
                <div class="icon-btn-wrapper">
                    <button id="new-schedule-btn" class="nice-button icon-button" title="Nuevo Cronograma"
                        data-i18n-title="newScheduleTitle">📄</button>
                    <span class="icon-btn-label" data-i18n="newBtn">Nuevo</span>
                </div>
                <div class="icon-btn-wrapper">
                    <button id="save-btn" class="nice-button icon-button" title="Guardar Cronograma"
                        data-i18n-title="saveScheduleTitle">💾</button>
                    <span class="icon-btn-label" data-i18n="saveBtn">Guardar</span>
                </div>
                <div class="icon-btn-wrapper">
                    <button id="load-btn" class="nice-button icon-button" title="Cargar Cronograma"
                        data-i18n-title="loadBtnTitle">📂</button>
                    <input type="file" id="load-input" style="display: none;" accept=".json">
                    <span class="icon-btn-label" data-i18n="loadBtn">Cargar</span>
                </div>
                <div class="icon-btn-wrapper">
                    <button id="copy-btn" class="nice-button icon-button" title="Copiar como Imagen"
                        data-i18n-title="copyImageTitle">📋</button>
                    <span class="icon-btn-label" data-i18n="copyBtn">Imagen</span>
                </div>
                <div class="icon-btn-wrapper share-wrapper">
                    <button id="share-btn" class="nice-button icon-button" title="Compartir enlace"
                        data-i18n-title="shareBtnTitle">🔗</button>
                    <span class="icon-btn-label" data-i18n="shareBtn">Compartir</span>
                    <div id="share-popup" class="share-popup" style="display:none;">
                        <div class="share-popup-title" data-i18n="sharePopupTitle">Compartir enlace</div>
                        <div class="share-popup-row">
                            <input type="text" id="share-url-input" readonly>
                            <button id="share-copy-btn" class="nice-button share-copy-btn" title="Copiar URL">📋</button>
                        </div>
                    </div>
                </div>
                <div class="icon-btn-wrapper">
                    <button id="export-excel-btn" class="nice-button icon-button" title="Exportar a Excel"
                        data-i18n-title="exportExcelTitle">📊</button>
                    <span class="icon-btn-label" data-i18n="excelBtn">Exportar</span>
                </div>
                <div class="icon-btn-wrapper">
                    <button id="undo-btn" class="nice-button icon-button" title="Deshacer (Ctrl+Z)"
                        data-i18n-title="undoTitle">↶</button>
                    <span class="icon-btn-label" data-i18n="undoBtn">Deshacer</span>
                </div>
                <div class="icon-btn-wrapper">
                    <button id="redo-btn" class="nice-button icon-button" title="Rehacer (Ctrl+Y)"
                        data-i18n-title="redoTitle">↷</button>
                    <span class="icon-btn-label" data-i18n="redoBtn">Rehacer</span>
                </div>
                <div class="select-group title-input-wrapper">
                    <label for="cronograma-title" class="title-label" data-i18n="scheduleLabel">Cronograma:</label>
                    <input type="text" id="cronograma-title" value="Mi Cronograma" placeholder="Título del Cronograma"
                        data-i18n-placeholder="schedulePlaceholder">
                </div>
            </div>
            <div class="controls">
                <div class="select-group">
                    <label for="start-month" data-i18n="startLabel">Inicio:</label>
                    <select id="start-month">
                        <!-- Opciones se generarán dinámicamente -->
                    </select>
                </div>
                <div class="select-group">
                    <label for="end-month" data-i18n="endLabel">Fin:</label>
                    <select id="end-month">
                        <!-- Opciones se generarán dinámicamente -->
                    </select>
                </div>
                <div class="select-group">
                    <label for="theme-selector" data-i18n="themeLabel">Tema:</label>
                    <select id="theme-selector">
                        <option value="oscuro" data-i18n="themeDark">Oscuro</option>
                        <option value="claro" data-i18n="themeLight">Claro</option>
                        <option value="moderno" data-i18n="themeModern">Moderno</option>
                        <option value="gris" data-i18n="themeGray">Gris</option>
                    </select>
                </div>
                <div class="select-group">
                    <label for="lang-selector" data-i18n="langLabel">Idioma:</label>
                    <select id="lang-selector">
                        <option value="es">ES</option>
                        <option value="en">EN</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="canvas-container">
            <canvas id="ganttHeaderCanvas"></canvas>
            <canvas id="ganttCanvas"></canvas>
            <div id="week-tooltip" class="week-tooltip"></div>
        </div>

        <div class="bottom-controls">
            <div>
                <button id="add-project-btn" class="nice-button" data-i18n="addProjectBtn">Añadir Proyecto</button>
                <button id="paste-table-btn" class="nice-button" data-i18n="pasteExcelBtn">Excel</button>
            </div>
        </div>
    </div>

    <!-- Área de pegado de tabla (inicialmente oculta) -->
    <div id="paste-area-container" style="display: none;">
        <div id="paste-instructions" data-i18n="pasteInstructions">
            Pega aquí tu tabla desde Excel (Proyecto en Columna A, Tarea en Columna B).
        </div>
        <textarea id="paste-textarea" placeholder="Ctrl+V"></textarea>
    </div>

    <!-- Gancho de estado para testing orientado a agente -->
    <div id="app-test-state" style="display:none;" data-testid="app-test-state"></div>


    <!-- Modal para editar tareas (inicialmente oculto) -->
    <div id="task-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content" data-testid="task-modal-content">
            <div class="modal-header">
                <h3 data-i18n="editTaskTitle">Editar Tarea</h3>
                <button class="modal-close-icon" data-testid="task-modal-close">&times;</button>
            </div>
            <label for="modal-task-name" data-i18n="taskNameLabel">Tarea:</label>
            <input type="text" id="modal-task-name" data-testid="task-name-input">



            <!-- Selects ocultos para compatibilidad con JS existente -->
            <select id="modal-task-type" data-testid="task-type-select" style="display:none;">
                <option value="normal">Normal</option>
                <option value="milestone">Hito</option>
            </select>
            <select id="modal-text-position" style="display:none;">
                <option value="inside">Dentro</option>
                <option value="outside">Fuera</option>
            </select>

            <label data-i18n="taskStyleLabel">Estilo:</label>
            <div class="task-style-picker">
                <button type="button" class="task-style-option" data-type="normal" data-text="outside" title="Barra con texto fuera" data-i18n-title="styleBarOutside">
                    <svg viewBox="0 0 80 32" width="80" height="32">
                        <rect x="4" y="8" width="36" height="16" rx="4" fill="var(--modal-border)"/>
                        <text x="46" y="20" font-size="10" fill="var(--text-color)">Abc</text>
                    </svg>
                </button>
                <button type="button" class="task-style-option" data-type="normal" data-text="inside" title="Barra con texto dentro" data-i18n-title="styleBarInside">
                    <svg viewBox="0 0 80 32" width="80" height="32">
                        <rect x="4" y="8" width="72" height="16" rx="4" fill="var(--modal-border)"/>
                        <text x="18" y="20" font-size="10" fill="#fff">Abc</text>
                    </svg>
                </button>
                <button type="button" class="task-style-option" data-type="milestone" data-text="outside" title="Hito con texto fuera" data-i18n-title="styleMilestoneOutside">
                    <svg viewBox="0 0 80 32" width="80" height="32">
                        <rect x="8" y="4" width="16" height="16" rx="2" transform="rotate(45 16 12)" fill="var(--modal-border)"/>
                        <text x="36" y="20" font-size="10" fill="var(--text-color)">Abc</text>
                    </svg>
                </button>
                <div class="style-toggles-right">
                    <label class="compact-toggle" title="Compacta" data-i18n-title="compactLabel">
                        <input type="checkbox" id="modal-task-compact">
                        <svg class="compact-toggle-icon" viewBox="0 0 20 12" width="20" height="12">
                            <rect x="1" y="1" width="18" height="4" rx="2" fill="currentColor"/>
                            <rect x="1" y="7" width="18" height="4" rx="2" fill="currentColor"/>
                        </svg>
                        <span data-i18n="compactLabel">Compacta</span>
                    </label>
                    <label class="compact-toggle" id="task-completed-toggle" title="Completada" data-i18n-title="completeBtn">
                        <input type="checkbox" id="modal-task-completed" data-testid="task-completed-checkbox">
                        <svg class="compact-toggle-icon" viewBox="0 0 18 18" width="16" height="16">
                            <path d="M2 9 L7 14 L16 4" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span data-i18n="completeBtn">Completada</span>
                    </label>
                </div>
            </div>

            <div class="modal-row">
                <div>
                    <label for="modal-task-color" data-i18n="taskColorLabel">Color Tarea:</label>
                    <div style="display: flex; gap: 5px; align-items: center;">
                        <input type="color" id="modal-task-color" data-testid="task-color-input">
                        <button id="modal-reset-color-btn" class="reset-color-btn" title="Restaurar color del proyecto"
                            data-testid="task-reset-color-btn" data-i18n-title="resetColorTitle">🔄</button>
                    </div>
                </div>
            </div>

            <div class="modal-actions" style="display: flex; justify-content: space-between; align-items: center;">
                <button id="modal-delete-btn" class="button-text-danger" data-testid="task-delete-btn"
                    title="Eliminar Tarea" data-i18n-title="deleteTaskBtn">🗑️</button>
                <button id="modal-accept-btn" class="nice-button" data-testid="task-accept-btn"
                    data-i18n="acceptBtn">Aceptar</button>
            </div>
        </div>
    </div>

    <!-- Modal para editar proyectos -->
    <div id="project-edit-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content" data-testid="project-modal-content">
            <div class="modal-header">
                <h3 data-i18n="editProjectTitle">Editar Proyecto</h3>
                <button class="modal-close-icon" data-testid="project-modal-close">&times;</button>
            </div>
            <label for="modal-project-name" data-i18n="projectNameLabel">Nombre:</label>
            <input type="text" id="modal-project-name" data-testid="project-name-input">

            <label data-i18n="taskStyleLabel">Estilo:</label>
            <div class="task-style-picker">
                <label class="compact-toggle" title="Compacto" data-i18n-title="compactProjectLabel">
                    <input type="checkbox" id="modal-project-compact">
                    <svg class="compact-toggle-icon" viewBox="0 0 20 12" width="20" height="12">
                        <rect x="1" y="1" width="18" height="4" rx="2" fill="currentColor"/>
                        <rect x="1" y="7" width="18" height="4" rx="2" fill="currentColor"/>
                    </svg>
                    <span data-i18n="compactProjectLabel">Compacto</span>
                </label>
            </div>

            <div class="modal-row">
                <div>
                    <label for="modal-project-color" data-i18n="projectColorLabel">Color:</label>
                    <div style="display: flex; gap: 5px; align-items: center;">
                        <input type="color" id="modal-project-color" data-testid="project-color-input">
                        <button id="modal-project-reset-color-btn" class="reset-color-btn" title="Restaurar color predeterminado"
                            data-i18n-title="resetProjectColorTitle">🔄</button>
                    </div>
                </div>
            </div>

            <div class="modal-actions" style="display: flex; justify-content: space-between; align-items: center;">
                <button id="modal-project-delete-btn" class="button-text-danger" data-testid="project-delete-btn"
                    title="Eliminar Proyecto" data-i18n-title="deleteProjectBtn">🗑️</button>
                <button id="modal-project-accept-btn" class="nice-button" data-testid="project-accept-btn"
                    data-i18n="acceptBtn">Aceptar</button>
            </div>
        </div>
    </div>

    <footer
        style="display: flex; justify-content: space-between; align-items: center; width: 95%; max-width: 1600px; padding: 10px 20px; font-size: 0.9em; color: var(--text-color); opacity: 0.8;">
        <span style="flex: 1;">
            <a href="llms.txt" target="_blank" rel="noopener alternate" type="text/plain"
               data-ai-doc="true"
               style="color: var(--text-color); text-decoration: none; border: 1px solid currentColor; border-radius: 4px; padding: 2px 8px; font-size: 0.85em; opacity: 0.7;"
               title="AI Agent API documentation">🤖 AI API</a>
        </span>
        <span style="flex: 1; text-align: center;">Powered by juangenovardortiz@gmail.com</span>
        <span style="flex: 1; text-align: right;">v.3.0</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="script.js"></script>
    <script>
        // Cache-busting para la hoja de estilos
        document.getElementById('main-stylesheet').href = `style.css?v=${new Date().getTime()}`;
    </script>
</body>

</html>
